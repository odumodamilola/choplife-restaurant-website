    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to polyfill fetch by assignment.
      try {
        const _fetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => _fetch,
          set: () => { console.warn('Blocked attempt to override window.fetch'); },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        // If fetch is not configurable, we just hope for the best
      }
    </script>
